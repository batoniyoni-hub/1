version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=5000
    volumes:
      - ./accounts.db:/app/accounts.db
      - ./proxies.db:/app/proxies.db
      - ./logs:/app/logs
    command: gunicorn -w 4 -b 0.0.0.0:5000 api_dashboard:app
    restart: unless-stopped

  db:
    image: sqlite:latest
    volumes:
      - ./data:/data
    restart: unless-stopped

volumes:
  data:
